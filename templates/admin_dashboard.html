<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — EasyLoan Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Outfit',sans-serif; background:#f0f4f8; color:#1e293b; min-height:100vh; overflow-x:hidden; }
.bg-shapes{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.shape{ position:absolute; border-radius:50%; opacity:0.08; animation:shapeFloat 10s ease-in-out infinite alternate; }
.shape-1{ width:450px; height:450px; background:linear-gradient(135deg,#f59e0b,#f97316); top:-12%; right:5%; }
.shape-2{ width:380px; height:380px; background:linear-gradient(135deg,#6366f1,#818cf8); bottom:-10%; left:0%; animation-delay:3s; }
@keyframes shapeFloat{ 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(40px,-25px) scale(1.1);} }

/* ===== NAVBAR ===== */
.navbar{
  position:sticky; top:0; z-index:1000;
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 36px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(245,158,11,0.08);
  box-shadow:0 1px 15px rgba(245,158,11,0.04);
}
.nav-brand{ font-family:'Inter',sans-serif; font-size:20px; font-weight:800; color:#0f172a; display:flex; align-items:center; gap:8px; }
.nav-badge{
  font-size:10px; padding:3px 10px; border-radius:20px;
  background:rgba(245,158,11,0.12); color:#d97706; font-weight:700;
  text-transform:uppercase; letter-spacing:0.5px;
}
.nav-links{ display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
.nav-links a{
  color:#64748b; text-decoration:none;
  font-size:13px; font-weight:500; padding:8px 14px;
  border-radius:8px; transition:all 0.3s;
}
.nav-links a:hover{ color:#d97706; background:rgba(245,158,11,0.06); }
.nav-links a.active{ color:#d97706; background:rgba(245,158,11,0.1); font-weight:600; }
.nav-links a.logout{ color:#ef4444; border:1px solid rgba(239,68,68,0.15); }
.nav-links a.logout:hover{ background:rgba(239,68,68,0.06); }

/* ===== MAIN ===== */
.main{ position:relative; z-index:1; padding:40px 36px; max-width:1100px; margin:auto; }

.welcome{ margin-bottom:40px; animation:fadeUp 0.6s ease-out; }
.welcome h1{ font-family:'Inter',sans-serif; font-size:32px; font-weight:800; color:#0f172a; }
.welcome p{ color:#94a3b8; font-size:15px; margin-top:4px; }
@keyframes fadeUp{ 0%{opacity:0;transform:translateY(20px);} 100%{opacity:1;transform:translateY(0);} }

/* ===== STAT CARDS ===== */
.stats-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px; margin-bottom:40px;
}
.stat-card{
  border-radius:20px; padding:30px 28px;
  position:relative; overflow:hidden;
  transition:all 0.4s ease;
  animation:fadeUp 0.8s ease-out both;
  backdrop-filter:blur(12px);
}
.stat-card:nth-child(1){ animation-delay:0.1s; }
.stat-card:nth-child(2){ animation-delay:0.2s; }
.stat-card:nth-child(3){ animation-delay:0.3s; }
.stat-card:nth-child(4){ animation-delay:0.4s; }
.stat-card:hover{ transform:translateY(-6px); }

.stat-card.users{
  background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(129,140,248,0.04));
  border:1px solid rgba(99,102,241,0.12);
}
.stat-card.users:hover{ box-shadow:0 12px 40px rgba(99,102,241,0.1); }
.stat-card.loans{
  background:linear-gradient(135deg,rgba(6,182,212,0.08),rgba(34,211,238,0.04));
  border:1px solid rgba(6,182,212,0.12);
}
.stat-card.loans:hover{ box-shadow:0 12px 40px rgba(6,182,212,0.1); }
.stat-card.pending{
  background:linear-gradient(135deg,rgba(245,158,11,0.08),rgba(252,211,77,0.04));
  border:1px solid rgba(245,158,11,0.12);
}
.stat-card.pending:hover{ box-shadow:0 12px 40px rgba(245,158,11,0.1); }
.stat-card.approved{
  background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(52,211,153,0.04));
  border:1px solid rgba(16,185,129,0.12);
}
.stat-card.approved:hover{ box-shadow:0 12px 40px rgba(16,185,129,0.1); }

.stat-icon{ font-size:28px; margin-bottom:12px; }
.stat-label{ font-size:13px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.stat-number{
  font-family:'Inter',sans-serif; font-size:36px; font-weight:800; color:#0f172a;
}
.stat-card.users .stat-number{ color:#6366f1; }
.stat-card.loans .stat-number{ color:#06b6d4; }
.stat-card.pending .stat-number{ color:#d97706; }
.stat-card.approved .stat-number{ color:#059669; }

@media(max-width:768px){
  .navbar{ padding:14px 20px; }
  .nav-links a{ font-size:12px; padding:6px 10px; }
  .main{ padding:24px 20px; }
}
</style>
</head>
<body>
<div class="bg-shapes"><div class="shape shape-1"></div><div class="shape shape-2"></div></div>

<nav class="navbar">
  <div class="nav-brand">EasyLoan <span class="nav-badge">Admin</span></div>
  <div class="nav-links">
    <a href="/admin-dashboard/" class="active">Dashboard</a>
    <a href="/all-loans/">All Loans</a>
    <a href="/pending-loans/">Pending</a>
    <a href="/approved-loans/">Approved</a>
    <a href="/loan-analytics/">Analytics</a>
    <a href="/admin-logout/" class="logout">Logout</a>
  </div>
</nav>

<div class="main">
  <div class="welcome">
    <h1>Admin Dashboard 🛡️</h1>
    <p>Overview of all loan operations</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card users">
      <div class="stat-icon">👥</div>
      <div class="stat-label">Total Users</div>
      <div class="stat-number" data-target="{{total_users}}">{{total_users}}</div>
    </div>
    <div class="stat-card loans">
      <div class="stat-icon">📋</div>
      <div class="stat-label">Total Loans</div>
      <div class="stat-number" data-target="{{total_loans}}">{{total_loans}}</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-icon">⏳</div>
      <div class="stat-label">Pending Loans</div>
      <div class="stat-number" data-target="{{pending}}">{{pending}}</div>
    </div>
    <div class="stat-card approved">
      <div class="stat-icon">✅</div>
      <div class="stat-label">Approved Loans</div>
      <div class="stat-number" data-target="{{approved}}">{{approved}}</div>
    </div>
  </div>
</div>

<!-- Count-up animation -->
<script>
document.addEventListener('DOMContentLoaded', function(){
  document.querySelectorAll('.stat-number[data-target]').forEach(el => {
    const target = parseInt(el.dataset.target) || 0;
    if(target === 0){ el.textContent = '0'; return; }
    let current = 0;
    const duration = 1500;
    const step = target / (duration / 16);
    const timer = setInterval(() => {
      current += step;
      if(current >= target){ current = target; clearInterval(timer); }
      el.textContent = Math.floor(current);
    }, 16);
  });
});
</script>
</body>
</html>
