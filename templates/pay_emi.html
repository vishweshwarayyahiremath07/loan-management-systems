<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay EMI — EasyLoan Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Outfit',sans-serif; background:linear-gradient(135deg,#eef2ff 0%,#e0f2fe 50%,#f0f4f8 100%); color:#1e293b; min-height:100vh; display:flex; justify-content:center; align-items:center; overflow-x:hidden; }
.bg-shapes{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.shape{ position:absolute; border-radius:50%; opacity:0.08; animation:shapeFloat 10s ease-in-out infinite alternate; }
.shape-1{ width:400px; height:400px; background:linear-gradient(135deg,#6366f1,#818cf8); top:-12%; right:5%; }
.shape-2{ width:350px; height:350px; background:linear-gradient(135deg,#06b6d4,#22d3ee); bottom:-10%; left:0%; animation-delay:3s; }
@keyframes shapeFloat{ 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(40px,-25px) scale(1.1);} }

.pay-card{
  position:relative; z-index:1; width:480px; max-width:92vw;
  background:rgba(255,255,255,0.8); border:1px solid rgba(99,102,241,0.08);
  border-radius:24px; padding:44px 40px;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(99,102,241,0.06);
  animation:cardIn 0.8s ease-out;
}
@keyframes cardIn{ 0%{opacity:0;transform:translateY(40px) scale(0.96);} 100%{opacity:1;transform:translateY(0) scale(1);} }

.page-title{ font-family:'Inter',sans-serif; font-size:28px; font-weight:800; text-align:center; margin-bottom:24px; color:#0f172a; }

.emi-info{
  background:rgba(99,102,241,0.06); border:1px solid rgba(99,102,241,0.12);
  border-radius:14px; padding:20px; text-align:center; margin-bottom:28px;
}
.emi-info .label{ font-size:12px; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.emi-info .amount{
  font-family:'Inter',sans-serif; font-size:32px; font-weight:800;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.emi-info .emi-num{ font-size:13px; color:#64748b; margin-top:6px; }

.form-group{ margin-bottom:22px; }
.form-group label{
  display:block; font-size:13px; font-weight:600;
  color:#64748b; margin-bottom:8px;
  text-transform:uppercase; letter-spacing:0.5px;
}
.form-group input, .form-group select{
  width:100%; padding:14px 18px;
  background:rgba(255,255,255,0.8); border:1px solid #e2e8f0;
  border-radius:12px; color:#1e293b; font-size:15px; font-family:'Outfit',sans-serif;
  outline:none; transition:all 0.3s ease;
}
.form-group input:focus, .form-group select:focus{
  border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,0.1); background:#fff;
}
.form-group select option{ background:#fff; color:#1e293b; }

.btn-pay{
  width:100%; padding:16px;
  background:linear-gradient(135deg,#059669,#10b981);
  border:none; border-radius:14px;
  color:#fff; font-size:16px; font-weight:700;
  font-family:'Outfit',sans-serif;
  cursor:pointer; transition:all 0.4s ease;
  position:relative; overflow:hidden;
  box-shadow:0 4px 20px rgba(16,185,129,0.25);
}
.btn-pay:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(16,185,129,0.35);
}

.back-link{ display:block; text-align:center; margin-top:24px; color:#94a3b8; font-size:14px; text-decoration:none; }
.back-link span{ color:#6366f1; font-weight:600; }

@media(max-width:500px){ .pay-card{padding:30px 24px;} }
</style>
</head>
<body>
<div class="bg-shapes"><div class="shape shape-1"></div><div class="shape shape-2"></div></div>

<div class="pay-card">
  <h1 class="page-title">💳 Pay EMI</h1>

  <div class="emi-info">
    <div class="label">EMI Amount</div>
    <div class="amount">₹ {{loan.emi}}</div>
    <div class="emi-num">EMI #{{emi}} of {{loan.duration}}</div>
  </div>

  <form method="POST" id="pay-emi-form">
    {% csrf_token %}
    <div class="form-group">
      <label>Amount (₹)</label>
      <input type="number" name="amount" value="{{loan.emi}}" required id="pay-amount">
    </div>
    <div class="form-group">
      <label>Payment Method</label>
      <select name="method" id="pay-method">
        <option>UPI</option>
        <option>Net Banking</option>
        <option>Credit Card</option>
        <option>Debit Card</option>
      </select>
    </div>
    <button type="submit" class="btn-pay" id="btn-pay-now">Pay Now ✓</button>
  </form>
  <a href="/emi-payment/" class="back-link">← Back to <span>EMI Payment</span></a>
</div>
</body>
</html>
