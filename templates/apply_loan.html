<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply Loan — EasyLoan Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family:'Outfit',sans-serif;
  background:#f0f4f8; color:#1e293b;
  min-height:100vh; overflow-x:hidden;
}
.bg-shapes{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.shape{ position:absolute; border-radius:50%; opacity:0.08; animation:shapeFloat 10s ease-in-out infinite alternate; }
.shape-1{ width:400px; height:400px; background:linear-gradient(135deg,#6366f1,#818cf8); top:-12%; right:10%; }
.shape-2{ width:350px; height:350px; background:linear-gradient(135deg,#06b6d4,#22d3ee); bottom:-10%; left:0%; animation-delay:3s; }
@keyframes shapeFloat{ 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(40px,-25px) scale(1.1);} }

.container{
  position:relative; z-index:1;
  width:560px; max-width:92vw;
  margin:60px auto;
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(99,102,241,0.08);
  border-radius:24px; padding:44px 40px;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(99,102,241,0.06);
  animation:cardIn 0.8s ease-out;
}
@keyframes cardIn{
  0%{ opacity:0; transform:translateY(40px) scale(0.96); }
  100%{ opacity:1; transform:translateY(0) scale(1); }
}

.page-title{
  font-family:'Inter',sans-serif; font-size:28px; font-weight:800;
  text-align:center; margin-bottom:8px; color:#0f172a;
}
.page-subtitle{
  text-align:center; color:#94a3b8;
  font-size:14px; margin-bottom:36px;
}

.form-group{ margin-bottom:22px; }
.form-group label{
  display:block; font-size:13px; font-weight:600;
  color:#64748b; margin-bottom:8px;
  text-transform:uppercase; letter-spacing:0.5px;
}
.form-group input,
.form-group select,
.form-group textarea{
  width:100%; padding:14px 18px;
  background:rgba(255,255,255,0.8);
  border:1px solid #e2e8f0;
  border-radius:12px; color:#1e293b;
  font-size:15px; font-family:'Outfit',sans-serif;
  outline:none; transition:all 0.3s ease;
}
.form-group input::placeholder,
.form-group textarea::placeholder{ color:#94a3b8; }
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 3px rgba(99,102,241,0.1);
  background:#fff;
}
.form-group select option{ background:#fff; color:#1e293b; }
.form-group textarea{ min-height:90px; resize:vertical; }

.btn-submit{
  width:100%; padding:16px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  border:none; border-radius:14px;
  color:#fff; font-size:16px; font-weight:700;
  font-family:'Outfit',sans-serif;
  cursor:pointer; transition:all 0.4s ease;
  position:relative; overflow:hidden;
  margin-top:8px;
  box-shadow:0 4px 20px rgba(79,70,229,0.25);
}
.btn-submit:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(79,70,229,0.35);
}
.btn-submit::after{
  content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  animation:shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{ 0%{left:-100%;} 50%{left:100%;} 100%{left:100%;} }

.back-link{
  display:block; text-align:center; margin-top:24px;
  color:#94a3b8; font-size:14px; text-decoration:none;
}
.back-link span{ color:#6366f1; font-weight:600; }
.back-link:hover span{ color:#4f46e5; }

@media(max-width:600px){
  .container{ padding:30px 24px; }
}
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
</div>

<div class="container">
  <h1 class="page-title">📝 Apply for a Loan</h1>
  <p class="page-subtitle">Fill in the details below to submit your application</p>

  <form method="POST" id="apply-loan-form">
    {% csrf_token %}

    <div class="form-group">
      <label>Loan Type</label>
      <select name="loan_type" required id="loan-type">
        <option value="Personal Loan">Personal Loan</option>
        <option value="Home Loan">Home Loan</option>
        <option value="Education Loan">Education Loan</option>
        <option value="Vehicle Loan">Vehicle Loan</option>
        <option value="Business Loan">Business Loan</option>
      </select>
    </div>

    <div class="form-group">
      <label>Loan Amount (₹)</label>
      <input type="number" name="amount" placeholder="Enter loan amount" required id="loan-amount">
    </div>

    <div class="form-group">
      <label>Loan Duration (Months)</label>
      <input type="number" name="duration" placeholder="Enter duration in months" required id="loan-duration">
    </div>

    <div class="form-group">
      <label>Purpose</label>
      <textarea name="purpose" placeholder="Briefly describe the purpose of this loan" id="loan-purpose"></textarea>
    </div>

    <button type="submit" class="btn-submit" id="btn-apply">Submit Application →</button>
  </form>

  <a href="/dashboard/" class="back-link">← Back to <span>Dashboard</span></a>
</div>

</body>
</html>
