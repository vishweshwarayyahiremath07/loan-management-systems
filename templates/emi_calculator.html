<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator — EasyLoan Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  font-family:'Outfit',sans-serif;
  background:linear-gradient(135deg,#eef2ff 0%,#e0f2fe 50%,#f0f4f8 100%);
  color:#1e293b;
  min-height:100vh; display:flex; justify-content:center; align-items:center;
  overflow-x:hidden;
}
.bg-shapes{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.shape{ position:absolute; border-radius:50%; opacity:0.08; animation:shapeFloat 10s ease-in-out infinite alternate; }
.shape-1{ width:400px; height:400px; background:linear-gradient(135deg,#6366f1,#818cf8); top:-12%; right:5%; }
.shape-2{ width:350px; height:350px; background:linear-gradient(135deg,#06b6d4,#22d3ee); bottom:-10%; left:0%; animation-delay:3s; }
@keyframes shapeFloat{ 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(40px,-25px) scale(1.1);} }

.calculator-card{
  position:relative; z-index:1;
  width:480px; max-width:92vw;
  background:rgba(255,255,255,0.8);
  border:1px solid rgba(99,102,241,0.08);
  border-radius:24px; padding:44px 40px;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(99,102,241,0.06);
  animation:cardIn 0.8s ease-out;
}
@keyframes cardIn{
  0%{ opacity:0; transform:translateY(40px) scale(0.96); }
  100%{ opacity:1; transform:translateY(0) scale(1); }
}

.page-title{
  font-family:'Inter',sans-serif; font-size:28px; font-weight:800;
  text-align:center; margin-bottom:8px; color:#0f172a;
}
.page-subtitle{
  text-align:center; color:#94a3b8;
  font-size:14px; margin-bottom:36px;
}

.form-group{ margin-bottom:22px; }
.form-group label{
  display:block; font-size:13px; font-weight:600;
  color:#64748b; margin-bottom:8px;
  text-transform:uppercase; letter-spacing:0.5px;
}
.form-group input{
  width:100%; padding:14px 18px;
  background:rgba(255,255,255,0.8);
  border:1px solid #e2e8f0;
  border-radius:12px; color:#1e293b;
  font-size:15px; font-family:'Outfit',sans-serif;
  outline:none; transition:all 0.3s ease;
}
.form-group input::placeholder{ color:#94a3b8; }
.form-group input:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 3px rgba(99,102,241,0.1);
  background:#fff;
}

.btn-calc{
  width:100%; padding:16px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  border:none; border-radius:14px;
  color:#fff; font-size:16px; font-weight:700;
  font-family:'Outfit',sans-serif;
  cursor:pointer; transition:all 0.4s ease;
  position:relative; overflow:hidden;
  box-shadow:0 4px 20px rgba(79,70,229,0.25);
}
.btn-calc:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(79,70,229,0.35);
}

/* ===== RESULT ===== */
.result-card{
  margin-top:28px; padding:24px;
  background:rgba(16,185,129,0.06);
  border:1px solid rgba(16,185,129,0.15);
  border-radius:16px; text-align:center;
  display:none;
  animation:resultPop 0.5s ease-out;
}
.result-card.show{ display:block; }
@keyframes resultPop{
  0%{ opacity:0; transform:scale(0.9); }
  100%{ opacity:1; transform:scale(1); }
}
.result-label{
  font-size:13px; font-weight:600;
  color:#94a3b8;
  text-transform:uppercase; letter-spacing:0.5px;
  margin-bottom:8px;
}
.result-amount{
  font-family:'Inter',sans-serif;
  font-size:36px; font-weight:800;
  background:linear-gradient(135deg,#059669,#10b981);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.result-details{
  margin-top:16px; display:flex; justify-content:center; gap:24px;
}
.result-detail{
  font-size:13px; color:#64748b;
}
.result-detail strong{ color:#0f172a; }

.error-result{
  margin-top:28px; padding:16px;
  background:rgba(239,68,68,0.06);
  border:1px solid rgba(239,68,68,0.15);
  border-radius:12px; text-align:center;
  color:#dc2626; font-size:14px; font-weight:500;
  display:none;
  animation:shake 0.4s ease;
}
.error-result.show{ display:block; }
@keyframes shake{
  0%{transform:translateX(0);} 25%{transform:translateX(-6px);}
  50%{transform:translateX(6px);} 75%{transform:translateX(-6px);}
  100%{transform:translateX(0);}
}

.back-link{
  display:block; text-align:center; margin-top:24px;
  color:#94a3b8; font-size:14px; text-decoration:none;
}
.back-link span{ color:#6366f1; font-weight:600; }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
</div>

<div class="calculator-card">
  <h1 class="page-title">🧮 EMI Calculator</h1>
  <p class="page-subtitle">Plan your loan repayment instantly</p>

  <div class="form-group">
    <label>Loan Amount (₹)</label>
    <input type="number" id="amount" placeholder="e.g. 500000">
  </div>

  <div class="form-group">
    <label>Annual Interest Rate (%)</label>
    <input type="number" id="interest" placeholder="e.g. 10.5" step="0.1">
  </div>

  <div class="form-group">
    <label>Duration (Months)</label>
    <input type="number" id="months" placeholder="e.g. 36">
  </div>

  <button class="btn-calc" onclick="calculateEMI()" id="btn-calculate">Calculate EMI →</button>

  <div class="result-card" id="result-card">
    <div class="result-label">Your Monthly EMI</div>
    <div class="result-amount" id="emi-amount">₹ 0</div>
    <div class="result-details">
      <div class="result-detail">Total Interest: <strong id="total-interest">₹ 0</strong></div>
      <div class="result-detail">Total Payment: <strong id="total-payment">₹ 0</strong></div>
    </div>
  </div>

  <div class="error-result" id="error-result">Please enter valid positive numbers!</div>

  <a href="/dashboard/" class="back-link">← Back to <span>Dashboard</span></a>
</div>

<script>
function calculateEMI(){
  var P = parseFloat(document.getElementById("amount").value);
  var R = parseFloat(document.getElementById("interest").value);
  var N = parseFloat(document.getElementById("months").value);

  var resultCard = document.getElementById("result-card");
  var errorResult = document.getElementById("error-result");

  if(!P || !R || !N || P<=0 || R<=0 || N<=0){
    resultCard.classList.remove("show");
    errorResult.classList.remove("show");
    void errorResult.offsetWidth;
    errorResult.classList.add("show");
    return;
  }

  errorResult.classList.remove("show");

  R = R / (12*100);
  var EMI = (P * R * Math.pow(1+R,N)) / (Math.pow(1+R,N)-1);
  var totalPayment = EMI * N;
  var totalInterest = totalPayment - P;

  document.getElementById("emi-amount").textContent = "₹ " + EMI.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  document.getElementById("total-interest").textContent = "₹ " + totalInterest.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  document.getElementById("total-payment").textContent = "₹ " + totalPayment.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",");

  resultCard.classList.remove("show");
  void resultCard.offsetWidth;
  resultCard.classList.add("show");
}
</script>

</body>
</html>
